syntax = "proto3";

package tests.store;

option go_package = "github.com/romannikov/fdb-go-layer-plugin/tests/store;store";

import "fdb-layer/annotations.proto";

message User {
    option (annotations.primary_key) = "id";
    option (annotations.secondary_index) = {
        fields: ["email"]
    };

    string id = 1;
    string name = 2;
    string email = 3;
}

message Product {
    option (annotations.primary_key) = "id";
    option (annotations.secondary_index) = {
        fields: ["category"]
    };

    string id = 1;
    string name = 2;
    string category = 3;
    int32 price = 4;
}

message Post {
    option (annotations.primary_key) = "id";
    option (annotations.secondary_index) = {
        fields: ["tags"]
    };

    string id = 1;
    repeated string tags = 2;
}

message TaskMessage {
    option (annotations.primary_key) = "queue_name";
    option (annotations.primary_key) = "shard_id";
    option (annotations.primary_key) = "versionstamp";

    string queue_name = 1;
    uint32 shard_id = 2;
    bytes versionstamp = 3 [(annotations.is_versionstamp) = true];
    bytes payload = 4;
}
